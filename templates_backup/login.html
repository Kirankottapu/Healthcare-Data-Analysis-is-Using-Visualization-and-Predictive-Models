<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | HealthAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            <p class="subtitle">Login to your HealthAI account</p>

            <!-- ── Flash Messages ── -->
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="flash-messages">
                {% for cat, msg in messages %}
                <div class="alert alert-{{ cat }}">
                    {{ msg }}
                    <button class="alert-close">&times;</button>
                </div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form action="{{ url_for('login') }}" method="POST">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-control"
                           placeholder="Enter your username" required autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control"
                           placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg mt-2">Login</button>
            </form>

            <p class="text-center mt-2">
                <a href="{{ url_for('forgot_password') }}" style="color:var(--primary); font-size:0.92rem; font-weight:500;">Forgot Password?</a>
            </p>
            <p class="text-center mt-2" style="color:var(--gray);">
                Don't have an account?
                <a href="{{ url_for('register') }}" style="font-weight:600;">Register here</a>
            </p>
            <p class="text-center mt-1">
                <a href="{{ url_for('home') }}" style="color:var(--gray); font-size:0.9rem;">&larr; Back to Home</a>
            </p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
