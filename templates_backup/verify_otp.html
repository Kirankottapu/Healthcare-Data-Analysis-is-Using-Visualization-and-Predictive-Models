<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP | HealthAI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        /* OTP input styling */
        .otp-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 20px 0;
        }
        .otp-inputs input {
            width: 52px;
            height: 60px;
            text-align: center;
            font-size: 1.6rem;
            font-weight: 700;
            border: 2px solid var(--gray-light);
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
            color: var(--primary);
        }
        .otp-inputs input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(13,110,253,0.15);
        }
        .otp-timer {
            text-align: center;
            color: var(--gray);
            font-size: 0.9rem;
            margin-top: 12px;
        }
        .otp-timer strong {
            color: var(--danger);
            font-size: 1.05rem;
        }
    </style>
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <div class="text-center mb-3">
                <div style="font-size:3rem; margin-bottom:8px;">📱</div>
                <h2>Verify OTP</h2>
                <p class="subtitle">
                    Enter the 6-digit OTP sent to<br>
                    <strong style="color:var(--primary);">{{ email }}</strong>
                </p>
            </div>

            <!-- ── Flash Messages ── -->
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="flash-messages">
                {% for cat, msg in messages %}
                <div class="alert alert-{{ cat }}">
                    {{ msg }}
                    <button class="alert-close">&times;</button>
                </div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}

            <form action="{{ url_for('verify_otp') }}" method="POST" id="otp-form">
                <!-- Hidden field that collects the full OTP -->
                <input type="hidden" name="otp" id="otp-hidden">

                <!-- Individual OTP digit boxes -->
                <div class="otp-inputs">
                    <input type="text" maxlength="1" class="otp-box" data-index="0" autofocus
                           inputmode="numeric" pattern="[0-9]" autocomplete="off">
                    <input type="text" maxlength="1" class="otp-box" data-index="1"
                           inputmode="numeric" pattern="[0-9]" autocomplete="off">
                    <input type="text" maxlength="1" class="otp-box" data-index="2"
                           inputmode="numeric" pattern="[0-9]" autocomplete="off">
                    <input type="text" maxlength="1" class="otp-box" data-index="3"
                           inputmode="numeric" pattern="[0-9]" autocomplete="off">
                    <input type="text" maxlength="1" class="otp-box" data-index="4"
                           inputmode="numeric" pattern="[0-9]" autocomplete="off">
                    <input type="text" maxlength="1" class="otp-box" data-index="5"
                           inputmode="numeric" pattern="[0-9]" autocomplete="off">
                </div>

                <div class="otp-timer">
                    OTP expires in <strong id="countdown">10:00</strong>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg mt-3">
                    ✅ Verify OTP
                </button>
            </form>

            <div class="text-center mt-3">
                <p style="color:var(--gray); font-size:0.9rem;">
                    Didn't receive the OTP?
                    <a href="{{ url_for('forgot_password') }}" style="font-weight:600;">Resend OTP</a>
                </p>
            </div>

            <p class="text-center mt-1">
                <a href="{{ url_for('login') }}" style="color:var(--gray); font-size:0.9rem;">&larr; Back to Login</a>
            </p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script>
        // ── OTP Digit Auto-Focus Logic ──
        const boxes = document.querySelectorAll('.otp-box');
        const hiddenInput = document.getElementById('otp-hidden');
        const form = document.getElementById('otp-form');

        boxes.forEach((box, idx) => {
            box.addEventListener('input', (e) => {
                const val = e.target.value;
                // Only allow digits
                if (!/^\d$/.test(val)) { e.target.value = ''; return; }
                // Move to next box
                if (idx < boxes.length - 1) boxes[idx + 1].focus();
            });

            box.addEventListener('keydown', (e) => {
                // Backspace → go to previous
                if (e.key === 'Backspace' && !box.value && idx > 0) {
                    boxes[idx - 1].focus();
                }
            });

            // Handle paste
            box.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasted = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
                pasted.split('').forEach((ch, i) => {
                    if (boxes[i]) boxes[i].value = ch;
                });
                if (pasted.length > 0) boxes[Math.min(pasted.length, 5)].focus();
            });
        });

        // Collect OTP on submit
        form.addEventListener('submit', (e) => {
            let otp = '';
            boxes.forEach(b => otp += b.value);
            if (otp.length !== 6) {
                e.preventDefault();
                alert('Please enter all 6 digits of the OTP.');
                return;
            }
            hiddenInput.value = otp;
        });

        // ── Countdown Timer (10 minutes) ──
        let timeLeft = 600; // 10 minutes in seconds
        const countdownEl = document.getElementById('countdown');
        const timer = setInterval(() => {
            timeLeft--;
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            countdownEl.textContent = `${mins}:${secs.toString().padStart(2, '0')}`;
            if (timeLeft <= 0) {
                clearInterval(timer);
                countdownEl.textContent = 'Expired';
                countdownEl.style.color = '#dc3545';
            }
        }, 1000);
    </script>
</body>
</html>
